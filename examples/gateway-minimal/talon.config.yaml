# Minimal gateway config — the smallest working Talon gateway.
# Proxies OpenAI API calls with PII scanning and audit logging.
#
# Usage:
#   talon secrets set openai-api-key "sk-your-key"
#   talon serve --gateway --gateway-config examples/gateway-minimal/talon.config.yaml
#
# Then point your app at:
#   OPENAI_BASE_URL=http://localhost:8080/v1/proxy/openai/v1
gateway:
  enabled: true
  mode: "shadow"

  providers:
    openai:
      enabled: true
      secret_name: "openai-api-key"

  # Identity lives in agent.talon.yaml (#266); mint the traffic key:
  #   talon secrets set my-app-talon-key "$(openssl rand -hex 24)"
  organization_policy:
    log_prompts: true
