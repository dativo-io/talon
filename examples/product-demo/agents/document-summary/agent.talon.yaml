# Use case 3 of 3 — document-summary
#
# A batch summarizer that runs on Anthropic and can run up a bill fast. Its
# cost control is a per-session budget: Talon adds each call's PROJECTED cost
# (spend so far + the next request's estimate) and denies the next call before
# it is sent once the session budget would be exceeded — the signed evidence
# carries the exact { limit, spent, estimate }. Session budgets are SOFT caps: a
# single in-flight request can overshoot before the next is denied.
#
# The daily cap is the hard, per-day ceiling that also drives the fleet
# attention queue: when a day's recorded spend reaches it, the use case shows
# HEALTH=blocked in `talon agents` until the period resets. It starts generous
# here; the demo measures the day's real spend and lowers this cap to that
# figure (a normal policy edit, picked up by periodic reload) so the fleet's
# blocked state reflects real, recorded period exhaustion — not a stochastic
# cost overshoot. The monthly cap is this use case's month budget (the figure
# the fleet COST column is measured against).
#
# These caps are deliberately small so the stops are visible in a short demo;
# the mechanism is identical at $50 or $50,000.
agent:
  name: document-summary
  description: "Batch document summarizer on Anthropic — session + daily budgets"
  version: "1.0.0"
  tenant_id: acme
  key:
    secret_name: document-summary-talon-key

policies:
  cost_limits:
    daily: 1.00       # generous per-day ceiling; the demo lowers it to the measured spend to stage HEALTH=blocked
    monthly: 50.00    # this use case's monthly budget (the fleet COST column denominator)
  session_limits:
    max_cost: 0.015   # soft per-session budget → the projected-cost receipt ({ limit, spent, estimate })

metadata:
  team: knowledge
