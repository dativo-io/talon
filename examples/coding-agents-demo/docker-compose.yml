# Talon coding-agents demo (#203, epic #192) — multi-model orchestration,
# governed. Offline and deterministic: the dual-wire mock speaks the
# Anthropic Messages API and the OpenAI Responses API (both with SSE), so no
# real API key ever exists in this stack.
#
#   make coding-agents-demo            # from repo root
#   cd examples/coding-agents-demo && ./demo.sh all

services:
  mock-provider:
    build:
      context: ../docker-compose/mock-provider
    # No host port: Talon reaches the mock over the compose network, and a
    # published 9090 collides with the other example stacks when two demos
    # run on one box. Add `ports: ["9090:9090"]` locally if you want to poke
    # the mock directly.
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  talon:
    build:
      context: ../../
    ports:
      # Override when 8080 is busy on the host (a local `talon serve`, the
      # other example stacks): DEMO_GATEWAY_PORT=18080 docker compose up -d
      # then GATEWAY=http://localhost:18080 ./demo.sh all
      - "${DEMO_GATEWAY_PORT:-8080}:8080"
    environment:
      - TALON_SECRETS_KEY=abcdefghijklmnopqrstuvwxyz012345
      - TALON_SIGNING_KEY=demo-signing-key-not-for-production
      - TALON_ADMIN_KEY=demo-admin-key
      - TALON_LOG_LEVEL=info
      - TALON_LOG_FORMAT=json
    volumes:
      - ./talon.config.yaml:/etc/talon/talon.config.yaml:ro
      - ./talon.config.yaml:/home/talon/.talon/talon.config.yaml:ro
      # NOTE: do not bind-mount ./out here. demo.sh writes ./out entirely
      # host-side (curl -o, and `talon_exec … > ./out/…` redirects on the
      # host), and a bind mount makes Docker create ./out as root — then the
      # host-side curl can't write it and fails with exit 23 after the request
      # already succeeded, killing the demo under `set -e`.
      - talon-data:/home/talon/.talon
    depends_on:
      mock-provider:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        # Demo scope: these secrets are stored with the default allow-all ACL —
        # fine here because this stack has exactly one tenant and the keys are
        # fakes. In multi-tenant deployments, scope each secret with
        # `talon secrets set <name> <value> --tenant <tenant>` (#237).
        talon secrets set anthropic-api-key mock-demo-not-a-real-key >/dev/null 2>&1 || true
        talon secrets set openai-api-key mock-demo-not-a-real-key >/dev/null 2>&1 || true
        exec talon serve --port 8080 --gateway --gateway-config /etc/talon/talon.config.yaml

volumes:
  talon-data:
    driver: local
