# Talon coding-agents demo config (#203): enforce mode, dual-wire mock,
# tiny session budget so the deny is reachable in seconds.
# Both "providers" are the same offline mock speaking the respective wire.

log_level: info
log_format: json

# No llm.pricing_file: the container has no repo checkout, so the binary's
# embedded pricing table (kept current since #231/#233) is used directly.

gateway:
  enabled: true
  listen_prefix: "/v1/proxy"
  mode: "enforce"

  providers:
    anthropic:
      enabled: true
      base_url: "http://mock-provider:9090"
      secret_name: "anthropic-api-key"
      api_family: "anthropic"
    openai:
      enabled: true
      base_url: "http://mock-provider:9090"
      secret_name: "openai-api-key"

  # Identity + overrides live in agent.talon.yaml (#266): the demo runs as the
  # claude-code agent, key seeded by the compose stack
  # (claude-code-talon-key = talon-gw-demo-coding-0001).
  organization_policy:
    defaults:
      pii_action: "warn"
      response_pii_action: "allow"
      daily_cost: 10.00
      monthly_cost: 100.00
    log_prompts: true
    log_responses: false
