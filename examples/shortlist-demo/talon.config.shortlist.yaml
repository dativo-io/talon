# Shortlist demo (#107) — enforce-mode gateway with mock provider (no real API key).
# Also loaded by `talon compliance *` inside the container (~/.talon/talon.config.yaml).
#
# Identity (#266): each demo scenario is its own AI use case — one
# agent.talon.yaml per scenario under agents/, each bound to a vault key:
#   talon secrets set shortlist-allow-talon-key <key>
#   talon secrets set shortlist-deny-talon-key  <key>
#   talon secrets set shortlist-eu-talon-key    <key>

compliance:
  controller:
    name: "Example GmbH"
    contact: "privacy@example.eu"
    dpo_contact: "dpo@example.eu"
    address: "Examplestr. 1, 10115 Berlin, Germany"

gateway:
  enabled: true
  listen_prefix: "/v1/proxy"
  mode: "enforce"

  providers:
    openai:
      enabled: true
      secret_name: "openai-api-key"
      base_url: "http://mock-openai:9090"
      region: "US"
      allowed_models: ["gpt-4o", "gpt-4o-mini", "gpt-4-turbo"]

  organization_policy:
    default_pii_action: "block"
    max_daily_cost: 100.00
    log_prompts: true
    log_responses: false

  rate_limits:
    global_requests_per_min: 300
    per_agent_requests_per_min: 60

  timeouts:
    connect_timeout: 10s
    request_timeout: 30s
    stream_idle_timeout: 30s
