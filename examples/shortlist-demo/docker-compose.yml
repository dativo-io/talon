# Talon #107 shortlist demo — enforce mode, mock OpenAI, no real API key.
#
#   make shortlist-demo          # from repo root
#   cd examples/shortlist-demo && ./demo.sh all

services:
  mock-openai:
    build:
      context: ../docker-compose/mock-provider
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  talon:
    build:
      context: ../../
    ports:
      - "8080:8080"
    environment:
      - TALON_SECRETS_KEY=abcdefghijklmnopqrstuvwxyz012345
      - TALON_SIGNING_KEY=demo-signing-key-not-for-production
      - TALON_LOG_LEVEL=info
      - TALON_LOG_FORMAT=json
      # Which agent this gateway serves (#266): shortlist-allow (default),
      # shortlist-policy-deny, or shortlist-eu-strict. The demo driver
      # restarts the service with this set to switch proofs.
      - TALON_ACT_AGENT=${TALON_ACT_AGENT:-shortlist-allow}
    volumes:
      - ./talon.config.shortlist.yaml:/etc/talon/talon.config.yaml:ro
      - ./talon.config.shortlist.yaml:/home/talon/.talon/talon.config.yaml:ro
      - ./agent.talon.yaml:/home/talon/agent.talon.yaml:ro
      - ./agents:/home/talon/agents:ro
      - ./out:/home/talon/shortlist-out
      - talon-data:/home/talon/.talon
    depends_on:
      mock-openai:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        talon secrets set openai-api-key mock-demo-not-a-real-key >/dev/null 2>&1 || true
        # Agent traffic keys (#266): one per demo proof identity. The gateway
        # serves ONE agent at a time; the demo driver switches proofs by
        # restarting this service with TALON_ACT_AGENT (agents_dir single-
        # process serving is #267).
        talon secrets set shortlist-allow-talon-key talon-shortlist-allow >/dev/null 2>&1 || true
        talon secrets set shortlist-deny-talon-key talon-shortlist-deny >/dev/null 2>&1 || true
        talon secrets set shortlist-eu-talon-key talon-shortlist-eu >/dev/null 2>&1 || true
        exec env TALON_DEFAULT_POLICY=/home/talon/agents/$${TALON_ACT_AGENT:-shortlist-allow}.talon.yaml \
          talon serve --port 8080 --gateway --gateway-config /etc/talon/talon.config.yaml

volumes:
  talon-data:
    driver: local
