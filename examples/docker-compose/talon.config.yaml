# Demo gateway config — used by docker compose up.
# Points at the mock OpenAI provider (no real API key needed).
gateway:
  enabled: true
  listen_prefix: "/v1/proxy"
  mode: "shadow"

  providers:
    openai:
      enabled: true
      secret_name: "openai-api-key"
      base_url: "http://mock-openai:9090"
      allowed_models: ["gpt-4o", "gpt-4o-mini", "gpt-4-turbo"]

  callers:
    - name: "demo-user"
      api_key: "talon-demo-key"
      tenant_id: "demo"
      team: "demo"

  default_policy:
    default_pii_action: "warn"
    max_daily_cost: 100.00
    require_caller_id: false
    log_prompts: true
    log_responses: false

  rate_limits:
    global_requests_per_min: 300
    per_caller_requests_per_min: 60

  timeouts:
    connect_timeout: 10s
    request_timeout: 30s
    stream_idle_timeout: 30s
