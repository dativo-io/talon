# Demo gateway config — used by docker compose up.
# Points at the mock OpenAI provider (no real API key needed).
gateway:
  enabled: true
  listen_prefix: "/v1/proxy"
  mode: "shadow"

  providers:
    openai:
      enabled: true
      secret_name: "openai-api-key"
      base_url: "http://mock-openai:9090"
      allowed_models: ["gpt-4o", "gpt-4o-mini", "gpt-4-turbo"]

  # Identity lives in agent.talon.yaml (#266); the compose stack seeds
  # demo-user-talon-key with the demo key value at startup.
  organization_policy:
    defaults:
      pii_action: "warn"
      daily_cost: 100.00
    log_prompts: true
    log_responses: false

  rate_limits:
    global_requests_per_min: 300
    per_agent_requests_per_min: 60

  timeouts:
    connect_timeout: 10s
    request_timeout: 30s
    stream_idle_timeout: 30s
