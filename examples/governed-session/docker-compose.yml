# Talon governed-session demo (#107 Act II) — REAL providers, no mock.
# One session: Anthropic planner (prompt-cache write/read) + OpenAI executors
# (cached_tokens reads) under one session budget, with PII and tool governance
# in the same signed-evidence trail — plus a genuine sovereignty-routing act
# (confidential data → US rejected → local Llama selected via the agent runner).
#
#   export ANTHROPIC_API_KEY=sk-ant-...   OPENAI_API_KEY=sk-...
#   make governed-session                  # from repo root (no Ollama needed)
#   cd examples/governed-session && ./demo.sh all
#
# The sovereignty-routing act needs a local Ollama. It is OPT-IN via the
# `routing-demo` compose profile so a normal run never pulls a multi-GB model:
#   docker compose --profile routing-demo up -d
#   docker compose exec ollama ollama pull llama3.2:1b
# Without it, the routing act notes Ollama is unavailable and skips its
# local-serve half instead of failing the demo.
#
# Each full run makes real API calls (cheap models, session-capped): ~$0.03
# (the recorded run's signed evidence totals ~$0.025 corrected; varies a little).

services:
  talon:
    build:
      context: ../../
    ports:
      # Override when 8080 is busy (another demo stack, a local `talon serve`):
      # DEMO_GATEWAY_PORT=18080 docker compose up -d
      - "${DEMO_GATEWAY_PORT:-8080}:8080"
    environment:
      - TALON_SECRETS_KEY=abcdefghijklmnopqrstuvwxyz012345
      - TALON_SIGNING_KEY=demo-signing-key-not-for-production
      - TALON_LOG_LEVEL=info
      - TALON_LOG_FORMAT=json
      # Ollama endpoint for the runner's sovereignty routing. Defaults to the
      # in-compose sidecar; override to reach a HOST-native Ollama (better on
      # RAM-constrained boxes where the sidecar can't load the model) with:
      #   TALON_OLLAMA_BASE_URL=http://host.docker.internal:11434 docker compose up -d talon
      - TALON_OLLAMA_BASE_URL=${TALON_OLLAMA_BASE_URL:-http://ollama:11434}
      # Real provider keys, passed through from the host environment. They are
      # stored in Talon's encrypted secret vault at container start and used
      # only for upstream auth — never logged, never in evidence.
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
    extra_hosts:
      # Make host.docker.internal resolve on Linux so a host-native Ollama is
      # reachable from this container (no-op if unused).
      - "host.docker.internal:host-gateway"
    volumes:
      - ./talon.config.session.yaml:/etc/talon/talon.config.yaml:ro
      - ./agents:/etc/talon/agents:ro
      - ./talon.config.session.yaml:/home/talon/.talon/talon.config.yaml:ro
      # Agent policy for the runner's sovereignty routing. serve resolves the
      # policy at ./agent.talon.yaml relative to its working dir (/home/talon),
      # so mount it there.
      - ./agent.talon.yaml:/home/talon/agent.talon.yaml:ro
      # NOTE: ./out is written host-side by demo.sh (exec redirects); binding
      # it here would make Docker create it root-owned and break host writes.
      - talon-data:/home/talon/.talon
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ -z "$${ANTHROPIC_API_KEY:-}" ] || [ -z "$${OPENAI_API_KEY:-}" ]; then
          echo "governed-session demo needs REAL keys:" >&2
          echo "  export ANTHROPIC_API_KEY=sk-ant-...  OPENAI_API_KEY=sk-..." >&2
          echo "then re-run: make governed-session" >&2
          exit 1
        fi
        talon secrets set anthropic-api-key "$${ANTHROPIC_API_KEY}" >/dev/null
        talon secrets set openai-api-key "$${OPENAI_API_KEY}" >/dev/null
        # Agent traffic keys (#266): one per demo act. The gateway serves the
        # hero act agent; switching acts = restarting with another
        # TALON_DEFAULT_POLICY — deliberate single-act activation (agents_dir
        # discovery, #267 shipped, could serve all acts at once).
        talon secrets set session-demo-talon-key "talon-session-demo" >/dev/null
        talon secrets set session-demo-redact-talon-key "talon-session-redact" >/dev/null
        talon secrets set session-demo-eu-talon-key "talon-session-eu" >/dev/null
        # Act switch: TALON_ACT_AGENT=session-demo-redact docker compose up -d talon
        exec env TALON_DEFAULT_POLICY=/etc/talon/agents/$${TALON_ACT_AGENT:-session-demo}.talon.yaml \
          talon serve --port 8080 --gateway --gateway-config /etc/talon/talon.config.yaml

  # Local model for the sovereignty-routing act. OPT-IN via the `routing-demo`
  # profile so a normal `make governed-session` never pulls a multi-GB model.
  # The model persists in the ollama-models volume across runs.
  #   docker compose --profile routing-demo up -d
  #   docker compose exec ollama ollama pull llama3.2:1b
  ollama:
    image: ollama/ollama:latest
    profiles: ["routing-demo"]
    environment:
      # Keep the model resident forever after the first load. On a small CPU
      # host the cold-start load (1B model ≈ 1.3 GB into RAM) is the slow part;
      # the default 5-minute idle unload makes every act pay it again. -1 pins it.
      - OLLAMA_KEEP_ALIVE=-1
      # One model, one context — never let Ollama try to load parallel contexts
      # on a RAM-constrained box (4 GB), which pushes it into swap and stalls.
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  talon-data:
    driver: local
  ollama-models:
    driver: local
