# Governed-session demo (#107 Act II) — REAL Anthropic + OpenAI providers,
# plus a local Ollama for the sovereignty-routing act.
# One agent session, one evidence trail, one visible X-Talon-Session-ID.
# Requires ANTHROPIC_API_KEY and OPENAI_API_KEY at stack start.
#
# Costs are enforced and displayed in the pricing table's currency (USD for
# the shipped table, #216). Budget caps below are denominated in that unit.

# Data-sovereignty posture: eu_preferred (NOT eu_strict). Under eu_preferred,
# US providers stay in the runner's candidate pool — so the sovereignty act
# can show OpenAI/US POLICY-REJECTED (with a real reason) rather than silently
# absent, then a local Llama SELECTED. eu_preferred is a no-op at the gateway
# proxy (which only hard-denies under eu_strict), so the OpenAI-backed proxy
# acts (happy path, tool strip, PII, budget) are unaffected. The confidential
# (tier-2) → LOCAL-only routing is driven by the agent policy + input
# classification, not by a demo shortcut.
sovereignty:
  mode: "eu_preferred"

# Runner's Ollama endpoint (buildProviders reads ollama_base_url, not
# llm.providers). Points at the ollama sidecar in the compose network.
ollama_base_url: "http://ollama:11434"
# Opt-in output ceiling for this demo's local model on modest CPU hosts: cap
# the routing act's generation so it returns promptly instead of grinding out
# the runner's default 2000 tokens. This is a DEMO setting — Talon honors the
# caller's requested output length verbatim by default (no global clamp).
ollama_max_num_predict: 256

compliance:
  controller:
    name: "Example GmbH"
    contact: "privacy@example.eu"
    dpo_contact: "dpo@example.eu"
    address: "Examplestr. 1, 10115 Berlin, Germany"

gateway:
  enabled: true
  listen_prefix: "/v1/proxy"
  mode: "enforce"

  providers:
    anthropic:
      enabled: true
      secret_name: "anthropic-api-key"
      base_url: "https://api.anthropic.com"
      region: "US"
      allowed_models: ["claude-sonnet-5", "claude-haiku-4-5"]
    openai:
      enabled: true
      secret_name: "openai-api-key"
      base_url: "https://api.openai.com"
      region: "US"
      allowed_models: ["gpt-4o", "gpt-4o-mini"]

  callers:
    - name: "session-demo"
      tenant_key: "talon-session-demo"
      tenant_id: "governed-session"
      team: "governed-session-demo"
      policy_overrides:
        # Session budget gate: the next request is denied pre-forward once
        # session spend + the fixed pre-request estimate exceeds this (#198).
        # The long demo accumulates real spend to this cap over several
        # executor calls; the hero crosses it after its two forwarded acts.
        max_session_cost: 0.03
        # Runtime tool-schema governance: admin_* tools are stripped from the
        # request body before the model can ever see them (filter action).
        forbidden_tools: ["admin_*"]
    # Model governance (long-demo act): this caller may only use gpt-4o-mini,
    # so a gpt-4o request is denied POLICY_DENIED_ROUTING at the gateway.
    - name: "session-demo-eu"
      tenant_key: "talon-session-eu"
      tenant_id: "governed-session"
      team: "governed-session-demo"
      policy_overrides:
        allowed_models: ["gpt-4o-mini"]
    # Output redaction (long-demo act): an email is scrubbed before the
    # provider call, but the request still succeeds (redact, not block).
    - name: "session-demo-redact"
      tenant_key: "talon-session-redact"
      tenant_id: "governed-session"
      team: "governed-session-demo"
      policy_overrides:
        pii_action: "redact"

  default_policy:
    default_pii_action: "block"
    # Hard safety net so a misbehaving loop cannot spend real money:
    max_daily_cost: 1.00
    require_caller_id: true
    # Real traffic: keep prompt/response bodies out of evidence storage.
    log_prompts: false
    log_responses: false

  rate_limits:
    global_requests_per_min: 120
    per_caller_requests_per_min: 60

  timeouts:
    connect_timeout: 10s
    request_timeout: 60s
    stream_idle_timeout: 60s
