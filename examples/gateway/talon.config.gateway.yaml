# Example Talon config with LLM API Gateway enabled.
# Use: talon serve --gateway --gateway-config=examples/gateway/talon.config.gateway.yaml
# Then point clients at http://localhost:8080/v1/proxy/openai/v1 or .../anthropic/v1
# (trailing /v1 so paths like chat/completions become .../v1/chat/completions)
#

gateway:
  enabled: true
  listen_prefix: "/v1/proxy"
  mode: "enforce"   # enforce | shadow | log_only

  providers:
    openai:
      enabled: true
      secret_name: "openai-api-key"
      base_url: "https://api.openai.com"
      allowed_models: ["gpt-4o", "gpt-4o-mini", "gpt-4-turbo"]
      blocked_models: []
    anthropic:
      enabled: true
      secret_name: "anthropic-api-key"
      base_url: "https://api.anthropic.com"
      allowed_models: ["claude-sonnet-4-20250514", "claude-3-5-sonnet-20241022"]
    ollama:
      enabled: true
      base_url: "http://localhost:11434"

  # Identity + per-use-case overrides live in agent files (#266): this example
  # ships two — agents/openclaw-main.talon.yaml and
  # agents/support-slack-bot.talon.yaml. Mint their traffic keys:
  #   talon secrets set openclaw-main-talon-key     "$(openssl rand -hex 24)"
  #   talon secrets set support-slack-bot-talon-key "$(openssl rand -hex 24)"
  # This example activates one file per gateway via the default_policy
  # setting. To serve several agents from one process, set agents_dir
  # (#267, shipped): discovery loads every file named exactly
  # agent.talon.yaml under it, so give each agent its own
  # agents/<name>/agent.talon.yaml.
  organization_policy:
    defaults:
      pii_action: "warn"
      daily_cost: 100.00
      monthly_cost: 2000.00
    log_prompts: true
    log_responses: false
    log_response_preview_chars: 0

  rate_limits:
    global_requests_per_min: 300
    per_agent_requests_per_min: 60

  timeouts:
    connect_timeout: 10s
    request_timeout: 120s
    stream_idle_timeout: 60s
