# Talon + Ollama scanner example config.
#
# scanner.type llm makes a local model the active PII engine: Talon prompts
# it for NER (fixed versioned prompt), relocates the reported values to byte
# offsets itself, and fails closed when the model is unreachable or replies
# with garbage. Timeout is generous — small models on CPU take seconds.

scanner:
  type: llm
  endpoint: "http://ollama:11434/v1"
  timeout: "60s"
  llm:
    model: "llama3.2:1b"
    confidence: 0.8

gateway:
  enabled: true
  listen_prefix: "/v1/proxy"
  mode: "enforce"

  providers:
    openai:
      enabled: true
      secret_name: "openai-api-key"
      base_url: "http://mock-openai:9090"
      allowed_models: ["gpt-4o", "gpt-4o-mini", "gpt-4-turbo"]

  # Identity lives in agent.talon.yaml (#266); the baseline already redacts.
  # Mint the traffic key: talon secrets set demo-user-talon-key "$(openssl rand -hex 24)"
  organization_policy:
    defaults:
      pii_action: "redact"

  response_scanning:
    enabled: true

  timeouts:
    connect_timeout: 10s
    request_timeout: 180s   # request scan + upstream + response scan + verify, all through the model
    stream_idle_timeout: 60s
