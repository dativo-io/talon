# Talon + Presidio scanner example config.
#
# The scanner block makes the Presidio analyzer container the active PII
# engine for everything (gateway request/response scanning, redaction,
# egress verification). Fail-closed: if the analyzer is down, PII-gated
# requests are blocked and startup refuses.

scanner:
  type: presidio
  endpoint: "http://presidio-analyzer:3000"
  timeout: "10s"
  min_score: 0.5
  name: "presidio-demo"
  engine_version: "latest"

gateway:
  enabled: true
  listen_prefix: "/v1/proxy"
  mode: "enforce"

  providers:
    openai:
      enabled: true
      secret_name: "openai-api-key"
      base_url: "http://mock-openai:9090"
      allowed_models: ["gpt-4o", "gpt-4o-mini", "gpt-4-turbo"]

  callers:
    - name: "demo-user"
      tenant_key: "talon-demo-key"
      tenant_id: "demo"
      team: "demo"
      policy_overrides:
        pii_action: "redact"

  default_policy:
    default_pii_action: "redact"
    require_caller_id: true

  response_scanning:
    enabled: true
