# Talon Agent Policy — Coding Agents (Claude Code, Codex CLI, orchestrators)
# Generated by: talon init --pack coding-agents
#
# Governs coding-agent LLM traffic routed through the Talon gateway.
# Honest defaults: streaming stays interactive (see the gateway config's
# response_pii_action note), budgets are soft caps, and credential
# recognizers catch the high-precision secrets coding sessions actually
# leak. Talon is NOT a secret scanner — run gitleaks/trufflehog in
# pre-commit for repository hygiene; these recognizers cover prompt/response
# traffic only.

agent:
  # Primary agent of the pack: Claude Code traffic. Codex is its own agent
  # (agents/codex/agent.talon.yaml) — one agent.talon.yaml = one AI use case
  # = one vault-bound traffic key (#266).
  name: claude-code
  description: Claude Code traffic governed by Talon
  version: "1.0.0"
  model_tier: 1
  key:
    secret_name: "claude-code-talon-key"

capabilities:
  allowed_tools:
    - file_read
    - web_search
    - code_interpreter
  forbidden_patterns:
    - "rm -rf /"
    - "DROP TABLE"
    - "sudo rm"

policies:
  cost_limits:
    per_request: 2.0
    daily: 50.0
    monthly: 500.0
  session_limits:
    # Soft cap per coding session (#198): a new request is denied once accrued
    # session spend + the pre-request estimate exceeds this. In-flight
    # requests can overshoot; atomic reservation is #144.
    max_cost: 10.00
  allowed_providers: ["anthropic"]
  rate_limits:
    requests_per_minute: 120
    concurrent_executions: 10
  data_classification:
    input_scan: true
    output_scan: true
    redact_pii: false # coding output: redaction mangles code; gateway agents use warn/allow
    # High-precision credential recognizers (#201). Deliberately few and
    # unambiguous: prefixed key formats and PEM blocks only — no entropy
    # heuristics, no generic "looks like a secret" guessing.
    custom_recognizers:
      - name: "PEM private key block"
        supported_entity: "PRIVATE_KEY"
        sensitivity: 3
        patterns:
          - name: "pem_private_key"
            regex: '-----BEGIN (?:RSA |EC |DSA |OPENSSH |PGP )?PRIVATE KEY-----'
            score: 0.95
      - name: "AWS access key id"
        supported_entity: "AWS_ACCESS_KEY"
        sensitivity: 3
        patterns:
          - name: "aws_akia"
            regex: '\bAKIA[0-9A-Z]{16}\b'
            score: 0.9
      - name: "GitHub token"
        supported_entity: "GITHUB_TOKEN"
        sensitivity: 3
        patterns:
          - name: "github_pat"
            regex: '\b(?:ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{22,})\b'
            score: 0.9
      - name: "LLM provider API key"
        supported_entity: "LLM_API_KEY"
        sensitivity: 3
        patterns:
          - name: "anthropic_or_openai_key"
            regex: '\bsk-(?:ant-[A-Za-z0-9_-]{24,}|proj-[A-Za-z0-9_-]{24,})\b'
            score: 0.9

compliance:
  frameworks: [gdpr]
  data_residency: eu
  ai_act_risk_level: limited

audit:
  retention_days: 365
