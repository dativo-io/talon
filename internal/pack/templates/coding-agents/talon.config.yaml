# Talon Infrastructure Configuration — Coding Agents Gateway (talon.config.yaml)
# Generated by: talon init --pack coding-agents
#
# Routes Claude Code (Anthropic wire) and Codex CLI (OpenAI Responses wire)
# through one governed gateway. Each tool is its own agent — one
# agent.talon.yaml = one AI use case = one vault-bound traffic key (#266) —
# so budgets, policy, and audit attribute per tool. Claude Code is the
# primary agent (agent.talon.yaml); Codex ships as agents/codex.talon.yaml
# (serving several agents from one process arrives with agents_dir, #267 —
# until then activate one file per gateway via the default_policy setting).
# Mint each agent's traffic key:
#   talon secrets set claude-code-talon-key "$(openssl rand -hex 24)"
#   talon secrets set codex-talon-key       "$(openssl rand -hex 24)"
# Subagent/session identity arrives via the neutral X-Talon-* headers or the
# built-in vendor adapters (evidence only — never a policy input; see
# docs/guides/governing-coding-agents.md).

llm:
  pricing_file: "pricing/models.yaml"

llm_provider: anthropic
log_level: info
log_format: console

evidence:
  type: sqlite
  path: ~/.talon/evidence.db

secrets_key_env: TALON_SECRETS_KEY

tenants:
  - id: default
    display_name: Default Tenant
    budgets:
      daily: 100.0
      monthly: 2000.0
    rate_limit: 240

gateway:
  enabled: true
  listen_prefix: "/v1/proxy"
  # Start in shadow: would-have-denied is recorded in signed evidence while
  # nothing blocks. Flip to "enforce" once the dashboards look right
  # (talon enforce --help for the migration flow).
  mode: "shadow"

  timeouts:
    # Coding generations are long; the default 120s request timeout hard-cuts
    # them (see LIMITATIONS.md). The response-header wait defaults to
    # request_timeout, so slow non-streaming prompts get the full 600s (#230).
    connect_timeout: "10s"
    request_timeout: "600s"
    stream_idle_timeout: "120s"

  providers:
    anthropic:
      enabled: true
      base_url: "https://api.anthropic.com"
      # Vault-stored key is the ONLY upstream auth mode for the anthropic
      # family (client_bearer is rejected at config load): agents present a
      # traffic key, Talon injects the provider key upstream.
      secret_name: "anthropic-api-key"
    openai:
      enabled: true
      base_url: "https://api.openai.com"
      secret_name: "openai-api-key"
      # Codex resends full context each turn with store:false — preserved by
      # default. Only set force_if_absent if your client depends on
      # previous_response_id continuity.
      # responses_store_mode: preserve

  # Traffic identity lives in the agent files (agent.key.secret_name, #266);
  # this block is the organization baseline every agent inherits.
  organization_policy:
    default_pii_action: "warn" # input scan: evidence + warning, code keeps flowing
    # allow is the honest streaming default: any other value buffers the
    # ENTIRE SSE stream (no visible tokens until generation completes).
    # When streaming-safe warn ships, move to it (see LIMITATIONS.md).
    response_pii_action: "allow"
    max_daily_cost: 100.00
    max_monthly_cost: 1000.00
    log_prompts: true
    log_responses: false
