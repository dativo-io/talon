# Talon Agent Policy — Codex CLI (agents/codex.talon.yaml)
# Generated by: talon init --pack coding-agents
#
# Codex traffic is its own AI use case with its own vault-bound key (#266).
# Mint it:  talon secrets set codex-talon-key "$(openssl rand -hex 24)"
# Serving several agents from one gateway process arrives with agents_dir
# (#267); until then activate this file per gateway via the default_policy
# setting. Credential recognizers ship in the primary agent file — copy the
# custom_recognizers block here if Codex traffic needs them too.

agent:
  name: codex
  description: Codex CLI traffic governed by Talon
  version: "1.0.0"
  model_tier: 1
  key:
    secret_name: "codex-talon-key"

policies:
  cost_limits:
    per_request: 2.0
    daily: 50.0
    monthly: 500.0
  session_limits:
    max_cost: 10.00
  allowed_providers: ["openai"]
  data_classification:
    input_scan: true
    output_scan: true
    redact_pii: false # coding output: redaction mangles code; scan-only (warn)

compliance:
  frameworks: [gdpr]
  data_residency: eu
  ai_act_risk_level: limited

audit:
  retention_days: 365

metadata:
  team: coding
