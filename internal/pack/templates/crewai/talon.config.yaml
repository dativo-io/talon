# Talon Infrastructure Configuration — CrewAI Gateway (talon.config.yaml)
# Generated by: talon init --pack crewai
#
# CrewAI uses OpenAI-compatible APIs. Point CrewAI's base URL to Talon.
# Each crew role is its own agent — one agent.talon.yaml = one AI use case =
# one vault-bound traffic key (#266) — so governance and audit attribute per
# role: crew-researcher (agent.talon.yaml), crew-writer and crew-reviewer
# (agents/<role>/agent.talon.yaml). Mint each key with
# `talon secrets set <name>-talon-key ...`.

llm:
  pricing_file: "pricing/models.yaml"

# Fleet mode (#267): scan this project for agent.talon.yaml files (finds all
# three roles) and serve every discovered agent with its own key, policy,
# and routing.
# agents_dir: "."

llm_provider: openai
log_level: info
log_format: console

evidence:
  type: sqlite
  path: ~/.talon/evidence.db

cache:
  enabled: false
  default_ttl: 3600
  similarity_threshold: 0.92
  max_entries_per_tenant: 10000

secrets_key_env: TALON_SECRETS_KEY

tenants:
  - id: default
    display_name: Default Tenant
    budgets:
      daily: 100.0
      monthly: 2000.0
    rate_limit: 120

gateway:
  enabled: true
  listen_prefix: "/v1/proxy"
  mode: "shadow"

  providers:
    openai:
      enabled: true
      secret_name: "openai-api-key"
      base_url: "https://api.openai.com"
      allowed_models: ["gpt-4o", "gpt-4o-mini", "gpt-4-turbo"]

  # Traffic identity lives in the agent files (agent.key.secret_name, #266);
  # this block is the organization baseline every role inherits.
  organization_policy:
    defaults:
      pii_action: "warn"
      response_pii_action: "warn"
      daily_cost: 50.00
      monthly_cost: 1000.00
      tool_policy_action: "filter"
      attachment_policy:
        action: "warn"
        injection_action: "warn"
        max_file_size_mb: 10
    constraints:
      forbidden_tools:
        - "shell_command"
        - "file_system_delete"
        - "database_drop"
    log_prompts: true
    log_responses: false

  rate_limits:
    global_requests_per_min: 200
    per_agent_requests_per_min: 60

  timeouts:
    connect_timeout: 10s
    request_timeout: 120s
    stream_idle_timeout: 60s
