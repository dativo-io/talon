# Talon Agent Policy — CrewAI (primary agent: researcher)
# Generated by: talon init --pack crewai
#
# Each crew role is its own AI use case with its own vault-bound key (#266):
# this file is the researcher; the writer and reviewer ship under agents/.
# Mint the traffic keys:
#   talon secrets set crew-researcher-talon-key "$(openssl rand -hex 24)"
#   talon secrets set crew-writer-talon-key     "$(openssl rand -hex 24)"
#   talon secrets set crew-reviewer-talon-key   "$(openssl rand -hex 24)"
# Serving several agents from one gateway process arrives with agents_dir
# (#267); until then activate one file per gateway via default_policy.

agent:
  name: crew-researcher
  description: CrewAI researcher role governed by Talon
  version: "1.0.0"
  model_tier: 1
  key:
    secret_name: "crew-researcher-talon-key"

capabilities:
  allowed_tools:
    - web_search
    - file_read
    - calculator
    - code_interpreter
  forbidden_patterns:
    - "DELETE FROM"
    - "DROP TABLE"
    - "rm -rf"
    - "sudo"

policies:
  cost_limits:
    per_request: 2.0
    daily: 15.0
    monthly: 300.0
  allowed_providers: ["openai"]
  resource_limits:
    timeout:
      operation: "60s"
      tool_execution: "5m"
      agent_total: "30m"
  rate_limits:
    requests_per_minute: 60
    concurrent_executions: 10
  data_classification:
    input_scan: true
    output_scan: true
    redact_pii: true
  model_routing:
    tier_0:
      primary: gpt-4o-mini
      location: any
    tier_1:
      primary: gpt-4o
      fallback: gpt-4o-mini
      location: eu
    tier_2:
      primary: gpt-4o
      location: eu

compliance:
  frameworks: [gdpr]
  data_residency: eu
  ai_act_risk_level: limited
