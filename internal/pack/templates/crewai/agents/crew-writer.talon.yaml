# Talon Agent Policy — CrewAI writer role (agents/crew-writer.talon.yaml)
# Generated by: talon init --pack crewai
# One crew role = one AI use case = one vault-bound key (#266).
# Mint it:  talon secrets set crew-writer-talon-key "$(openssl rand -hex 24)"

agent:
  name: crew-writer
  description: CrewAI writer role governed by Talon
  version: "1.0.0"
  model_tier: 1
  key:
    secret_name: "crew-writer-talon-key"

policies:
  cost_limits:
    per_request: 2.0
    daily: 15.0
    monthly: 300.0
  allowed_providers: ["openai"]
  data_classification:
    input_scan: true
    output_scan: true
    # Writer output reaches people: scrub PII from the prompt before the
    # provider sees it.
    redact_input: true

compliance:
  frameworks: [gdpr]
  data_residency: eu
  ai_act_risk_level: limited

metadata:
  team: crewai
