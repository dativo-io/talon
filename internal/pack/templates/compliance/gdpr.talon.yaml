# GDPR Compliance Overlay
# Generated by: talon init --compliance gdpr
#
# Claims discipline: these settings provide supporting controls and evidence
# for the annotated articles. They do not, by themselves, make you compliant.
# Each "supports:" line links to its entry in internal/compliance/mapping.go
# (DefaultMappings) — the link is enforced by a test.

policies:
  data_classification:
    # supports: gdpr Art. 32 — internal/classifier/pii.go (PII detection and model/data-tier routing)
    input_scan: true
    output_scan: true
    redact_pii: true
    block_on_pii: false   # Set to true for strict mode

  model_routing:
    # supports: gdpr Art. 44-50 — internal/policy/rego/routing.rego (EU data residency routing controls)
    tier_1:
      location: eu       # Data stays in EU
    tier_2:
      location: eu       # Sensitive data stays in EU (enforced via routing.rego)
      # To route sensitive data only via AWS Bedrock, set bedrock_only: true and use
      # Bedrock model naming (e.g. anthropic.*) with a Bedrock provider configured.

audit:
  # supports: gdpr Art. 30 — internal/evidence/store.go (Processing records via signed evidence export)
  log_level: detailed
  retention_days: 365
  include_prompts: true
  include_responses: false           # Minimize stored personal data
  # supports: gdpr Art. 5(1)(c) — internal/classifier/pii.go (Data minimization via PII redaction before prompt storage)
  include_original_prompts: false    # When redact_input is active, store only the redacted prompt

compliance:
  frameworks: [gdpr]
  data_residency: eu
