# DORA Compliance Overlay (Financial Services)
# Generated by: talon init --compliance dora
#
# Claims discipline: these settings provide supporting controls and evidence
# for the annotated articles. They do not, by themselves, make you compliant.
# Each "supports:" line links to its entry in internal/compliance/mapping.go
# (DefaultMappings) — the link is enforced by a test.

policies:
  cost_limits:
    # supports: dora Art. 6 — internal/policy/engine.go (ICT risk management via policy-as-code cost and resource limits)
    daily: 50.0
    monthly: 1000.0

  data_classification:
    # supports: gdpr Art. 32 — internal/classifier/pii.go (PII detection and model/data-tier routing)
    input_scan: true
    output_scan: true
    redact_pii: true
    block_on_pii: true   # Strict: block on any PII for financial data

  model_routing:
    # supports: gdpr Art. 44-50 — internal/policy/rego/routing.rego (EU data residency routing controls)
    tier_0:
      location: eu       # Even non-sensitive financial data stays in EU
    tier_1:
      location: eu
    tier_2:
      location: eu
      # To route data only via AWS Bedrock, set bedrock_only: true on these tiers and use
      # Bedrock model naming (e.g. anthropic.*) with a Bedrock provider configured.

audit:
  # supports: dora Art. 11 — internal/evidence/store.go (ICT incident traceability with signed audit trail)
  log_level: full
  retention_days: 1825   # 5 years for financial record keeping
  include_prompts: true
  include_responses: true
  # supports: gdpr Art. 5(1)(c) — internal/classifier/pii.go (Data minimization via PII redaction before prompt storage)
  include_original_prompts: false    # Default false: stores redacted prompt when redact_input is active

compliance:
  frameworks: [dora, gdpr]
  data_residency: eu
