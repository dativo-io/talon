# EU AI Act Compliance Overlay
# Generated by: talon init --compliance eu-ai-act
#
# Claims discipline: these settings provide supporting controls and evidence
# for the annotated articles. They do not, by themselves, make you compliant.
# Each "supports:" line links to its entry in internal/compliance/mapping.go
# (DefaultMappings) — the link is enforced by a test.

policies:
  data_classification:
    # supports: eu-ai-act Art. 9 — internal/policy/engine.go (Risk management via embedded policy engine enforcement)
    input_scan: true
    output_scan: true

audit:
  # supports: eu-ai-act Art. 11 — internal/agent/plan.go (Technical documentation through execution plans and evidence)
  # supports: eu-ai-act Art. 13 — internal/evidence/store.go (Transparency via execution/model/cost traceability)
  log_level: full
  retention_days: 365
  include_prompts: true
  include_responses: true
  # supports: gdpr Art. 5(1)(c) — internal/classifier/pii.go (Data minimization via PII redaction before prompt storage)
  include_original_prompts: false    # Default false: stores redacted prompt when redact_input is active

compliance:
  frameworks: [eu-ai-act]
  ai_act_risk_level: limited    # Adjust: minimal | limited | high
  # supports: eu-ai-act Art. 14 — internal/agent/plan_review.go (Human oversight via plan review gate)
  human_oversight: on-demand
  plan_review:
    require_for_tools: true     # review when tools are used
    require_for_tier: "tier_2"  # review for sensitive data
    cost_threshold: 10.0       # review above cost threshold (EUR)
    timeout_minutes: 60
    notify_webhook: ""
