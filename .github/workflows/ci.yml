name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Install SQLite
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Download dependencies
        run: go mod download

      - name: Format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      # All test tiers: unit (internal + cmd), integration (tests/integration), e2e (tests/e2e)
      # Coverage: exclude cmd/talon (main) and internal/testutil (test helpers); threshold 65% (goal 70%)
      - name: Run unit tests
        run: go test -race -coverprofile=coverage-${{ matrix.go-version }}.out $(go list ./internal/... ./cmd/... | grep -v internal/testutil | grep -v internal/llm/testutil | grep -v 'cmd/talon')

      - name: Validate PII benchmark baseline artifacts
        run: |
          set -euo pipefail
          for f in testdata/benchmarks/pii_scan_baseline.*.json; do
            jq -e '.benchmark and .baseline_ns_per_op and .threshold_percent' "$f" >/dev/null
            echo "ok: $f"
          done

      - name: PII scan benchmark regression (linux/amd64)
        run: make benchmark-regression

      - name: Run integration tests
        run: go test -race -tags=integration ./tests/integration/...

      - name: Run e2e tests
        run: go test -tags=e2e -timeout 5m ./tests/e2e/...

      - name: Check coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage-${{ matrix.go-version }}.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 65" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 65% target"
            exit 1
          fi

      - name: Conformance count (evidence + policy paths)
        run: |
          set -o pipefail
          make conformance | tee -a "$GITHUB_STEP_SUMMARY"

      - name: OPA/Rego policy tests
        run: |
          if ! command -v opa &> /dev/null; then
            curl -L -o opa https://github.com/open-policy-agent/opa/releases/latest/download/opa_linux_amd64_static
            chmod +x opa
            sudo mv opa /usr/local/bin/
          fi
          opa test internal/policy/rego/ -v

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.go-version }}
          path: coverage-${{ matrix.go-version }}.out

      - name: Upload to Codecov
        if: matrix.go-version == '1.25.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage-1.25.12.out
          fail_ci_if_error: false

  proof-gates:
    name: Epic #112 proof gates
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'
          cache: true

      - name: Install SQLite
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Download dependencies
        run: go mod download

      - name: Run proof gates
        run: make proof-gates

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout 5m

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Lint every tracked shell script (#242): three shell-only demo bugs
      # (#239 #240 #241) shipped because CI never looked at *.sh. Config lives
      # in .shellcheckrc. The version is pinned: the runner's preinstalled
      # shellcheck emits SC2317 false positives on indirectly-invoked
      # functions that 0.11 correctly skips.
      - name: Install shellcheck
        run: |
          curl -fsSL https://github.com/koalaman/shellcheck/releases/download/v0.11.0/shellcheck-v0.11.0.linux.x86_64.tar.xz \
            | tar -xJ -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/shellcheck-v0.11.0" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/shellcheck-v0.11.0/shellcheck" --version

      - name: shellcheck
        run: git ls-files -z '*.sh' | xargs -0 shellcheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint]

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.12'
          cache: true

      - name: Install cross-compilation tools
        if: matrix.goarch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
        run: |
          make build
          ls -lh bin/

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: talon-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/talon

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, lint]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t talon:ci .

      - name: Verify image size
        run: |
          SIZE=$(docker image inspect talon:ci --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Docker image size: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -gt 50 ]; then
            echo "::warning::Docker image ${SIZE_MB}MB exceeds 50MB target"
          fi

      - name: Test binary in container
        run: |
          docker run --rm talon:ci version
          docker run --rm talon:ci --help
