version: 2

project_name: talon

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: talon
    main: ./cmd/talon/
    binary: talon
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # goreleaser builds ONLY linux/amd64 (#326): CGO (mattn/go-sqlite3)
    # cross-compilation via osxcross/mingw has been unreliable, so darwin
    # archives are built natively by the release-darwin job in
    # .github/workflows/release.yml (#359) and uploaded to the same release
    # (with per-file .sha256 checksums, separate from checksums.txt).
    # Windows and linux/arm64 remain unshipped — tracked in #359.
    ignore:
      - goos: linux
        goarch: arm64
      - goos: darwin
        goarch: amd64
      - goos: darwin
        goarch: arm64
      - goos: windows
        goarch: amd64
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/dativo-io/talon/internal/cmd.Version={{.Version}}
      - -X github.com/dativo-io/talon/internal/cmd.Commit={{.ShortCommit}}
      - -X github.com/dativo-io/talon/internal/cmd.BuildDate={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

# Squash-merge subjects here are SCOPED conventional commits ("feat(fleet): …",
# "fix(pack): …"), so every pattern must accept an optional scope and a group
# without a regexp must exist as the catch-all — goreleaser DISCARDS commits
# that match no group, which is how the v1.8.0 release notes shipped with a
# single commit and silently dropped the whole #266 cutover (#325).
changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs(\([^)]*\))?[!]?:'
      - '^test(\([^)]*\))?[!]?:'
      - '^chore(\([^)]*\))?[!]?:'
      - '^ci(\([^)]*\))?[!]?:'
  groups:
    - title: 'New Features'
      regexp: '^feat(\([^)]*\))?[!]?:'
      order: 0
    - title: 'Bug Fixes'
      regexp: '^fix(\([^)]*\))?[!]?:'
      order: 1
    - title: 'Security'
      regexp: '^sec(\([^)]*\))?[!]?:'
      order: 2
    - title: 'Other'
      order: 999

dockers:
  - image_templates:
      - "ghcr.io/dativo-io/talon:{{ .Version }}"
      - "ghcr.io/dativo-io/talon:{{ .Major }}.{{ .Minor }}"
      - "ghcr.io/dativo-io/talon:latest"
    dockerfile: Dockerfile.goreleaser
    build_flag_templates:
      - "--build-arg=VERSION={{.Version}}"
      - "--build-arg=COMMIT={{.Commit}}"
      - "--build-arg=BUILD_DATE={{.Date}}"
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title=talon"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/dativo-io/talon"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

release:
  github:
    owner: dativo-io
    name: talon
  draft: false
  prerelease: auto
  # Re-run safe: if assets already exist on this tag's release, delete and retry upload.
  replace_existing_artifacts: true
  # Keep release notes aligned with the latest run output.
  mode: replace
