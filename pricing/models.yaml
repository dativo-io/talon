# pricing/models.yaml
# Operator-editable LLM pricing table.
# Prices are per 1,000,000 tokens in USD.
# Update this file when providers change pricing — no recompilation required.
#
# To disable cost estimation for a provider, omit it or set prices to 0.
# Unknown models return cost 0.0 with a warning log.

version: "1"

providers:
  openai:
    models:
      gpt-4o:
        input_per_1m: 2.50
        output_per_1m: 10.00
      gpt-4o-mini:
        input_per_1m: 0.15
        output_per_1m: 0.60
      gpt-4-turbo:
        input_per_1m: 10.00
        output_per_1m: 30.00
      o1:
        input_per_1m: 15.00
        output_per_1m: 60.00
      o1-mini:
        input_per_1m: 1.10
        output_per_1m: 4.40
      o3-mini:
        input_per_1m: 1.10
        output_per_1m: 4.40
      # Current lineup, verified against developers.openai.com/api/docs/pricing,
      # 2026-07. Cached-input rates land with the cache-aware pricing schema
      # (epic #192 PR-E / #196).
      gpt-5.5:
        input_per_1m: 5.00
        output_per_1m: 30.00
      gpt-5.5-pro:
        input_per_1m: 30.00
        output_per_1m: 180.00
      gpt-5.4:
        input_per_1m: 2.50
        output_per_1m: 15.00
      gpt-5.4-mini:
        input_per_1m: 0.75
        output_per_1m: 4.50
      gpt-5.4-nano:
        input_per_1m: 0.20
        output_per_1m: 1.25
      gpt-5.4-pro:
        input_per_1m: 30.00
        output_per_1m: 180.00
      gpt-5.3-codex:
        input_per_1m: 1.75
        output_per_1m: 14.00

  anthropic:
    # Verified against platform.claude.com pricing, 2026-07. Cache read/write
    # rates land with the cache-aware pricing schema (epic #192 PR-E / #196).
    models:
      claude-fable-5:
        input_per_1m: 10.00
        output_per_1m: 50.00
      claude-opus-4-8:
        input_per_1m: 5.00
        output_per_1m: 25.00
      claude-opus-4-7:
        input_per_1m: 5.00
        output_per_1m: 25.00
      claude-opus-4-6:
        input_per_1m: 5.00
        output_per_1m: 25.00
      claude-opus-4-5:
        input_per_1m: 5.00
        output_per_1m: 25.00
      # Standard rate; introductory $2/$10 applies through 2026-08-31 —
      # operators on intro pricing can lower this locally.
      claude-sonnet-5:
        input_per_1m: 3.00
        output_per_1m: 15.00
      claude-sonnet-4-6:
        input_per_1m: 3.00
        output_per_1m: 15.00
      claude-sonnet-4-5:
        input_per_1m: 3.00
        output_per_1m: 15.00
      claude-haiku-4-5:
        input_per_1m: 1.00
        output_per_1m: 5.00
      # Deprecated / legacy models still callable:
      claude-sonnet-4-20250514:
        input_per_1m: 3.00
        output_per_1m: 15.00
      claude-haiku-3-5:
        input_per_1m: 0.80
        output_per_1m: 4.00
      claude-opus-4-20250514:
        input_per_1m: 15.00
        output_per_1m: 75.00

  azure-openai:
    # Azure uses the same model pricing as OpenAI.
    # Operators should adjust if their enterprise agreement differs.
    inherit: openai

  mistral:
    models:
      mistral-large-latest:
        input_per_1m: 2.00
        output_per_1m: 6.00
      mistral-small-latest:
        input_per_1m: 0.20
        output_per_1m: 0.60
      codestral-latest:
        input_per_1m: 0.30
        output_per_1m: 0.90

  cohere:
    models:
      command-r-plus:
        input_per_1m: 2.50
        output_per_1m: 10.00
      command-r:
        input_per_1m: 0.15
        output_per_1m: 0.60

  qwen:
    models:
      qwen-max:
        input_per_1m: 1.60
        output_per_1m: 6.40
      qwen-plus:
        input_per_1m: 0.40
        output_per_1m: 1.20
      qwen-turbo:
        input_per_1m: 0.05
        output_per_1m: 0.20

  vertex:
    # Vertex hosts Gemini models. Operators on committed-use may override.
    models:
      gemini-1.5-pro:
        input_per_1m: 1.25
        output_per_1m: 5.00
      gemini-1.5-flash:
        input_per_1m: 0.075
        output_per_1m: 0.30
      gemini-2.0-flash:
        input_per_1m: 0.10
        output_per_1m: 0.40

  bedrock:
    # Bedrock hosts multiple foundation models. List the ones your org uses.
    models:
      anthropic.claude-sonnet-4-20250514-v1:0:
        input_per_1m: 3.00
        output_per_1m: 15.00
      amazon.titan-text-express-v1:
        input_per_1m: 0.20
        output_per_1m: 0.60

  ollama:
    # Local models have no per-token cost. Operator may add compute amortisation.
    models: {}

  generic-openai:
    # Operator must populate manually — pricing depends on the target endpoint.
    models: {}
