# OpenClaw + Talon primer — the OpenClaw use case (#266).
# One agent.talon.yaml = one AI use case = one vault-bound traffic key:
#   talon secrets set openclaw-main-talon-key "$(openssl rand -hex 24)"
# OpenClaw presents that value as its API key.

agent:
  name: openclaw-main
  description: OpenClaw LLM traffic governed by Talon
  version: 1.0.0
  key:
    secret_name: "openclaw-main-talon-key"

policies:
  cost_limits:
    daily: 25.00
    monthly: 500.00
  models:
    allowed: ["gpt-4o", "gpt-4o-mini", "gpt-4-turbo"]
  allowed_providers: ["openai"]
  data_classification:
    input_scan: true
    redact_input: true

metadata:
  team: engineering
