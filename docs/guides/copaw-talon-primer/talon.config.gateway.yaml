# CoPaw + Talon primer — one provider (OpenAI), one caller (copaw-main).

gateway:
  enabled: true
  listen_prefix: "/v1/proxy"
  mode: "enforce"

  providers:
    openai:
      enabled: true
      secret_name: "openai-api-key"
      base_url: "https://api.openai.com"
      allowed_models: ["gpt-4o", "gpt-4o-mini", "gpt-4-turbo"]

  # Identity + per-use-case overrides live in agent.talon.yaml (#266); this
  # block is the organization baseline. Mint the agent traffic key:
  #   talon secrets set copaw-main-talon-key "$(openssl rand -hex 24)"
  organization_policy:
    default_pii_action: "warn"
    response_pii_action: "warn"
    max_daily_cost: 100.00
    max_monthly_cost: 2000.00
    log_prompts: true
    log_responses: false
    tool_policy_action: "filter"
    forbidden_tools:
      - "delete_*"
      - "admin_*"
      - "export_all_*"
      - "bulk_*"
      - "rm_*"
      - "drop_*"
    attachment_policy:
      action: "warn"
      injection_action: "warn"
      max_file_size_mb: 10

  rate_limits:
    global_requests_per_min: 300
    per_agent_requests_per_min: 60

  timeouts:
    connect_timeout: 10s
    request_timeout: 120s
    stream_idle_timeout: 60s
