# CoPaw + Talon primer — the CoPaw use case (#266).
# Mint the traffic key CoPaw presents:
#   talon secrets set copaw-main-talon-key "$(openssl rand -hex 24)"

agent:
  name: copaw-main
  description: CoPaw LLM traffic governed by Talon
  version: 1.0.0
  key:
    secret_name: "copaw-main-talon-key"

policies:
  cost_limits:
    daily: 25.00
    monthly: 500.00
  models:
    allowed: ["gpt-4o", "gpt-4o-mini", "gpt-4-turbo"]
  allowed_providers: ["openai"]
  data_classification:
    input_scan: true
    redact_input: true

metadata:
  team: engineering
  tags: ["copaw"]
